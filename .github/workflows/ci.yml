name: Streaming Pipeline CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Java (required for PySpark)
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin

      - name: Install dependencies
        run: |
          pip install pyspark==3.5.0 delta-spark==3.0.0 pytest pytest-cov
          pip install boto3 moto[kinesis,s3,secretsmanager]

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=consumer --cov=producer

 cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: test
    if: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install -g aws-cdk
      - run: pip install -r requirements.txt
      - name: CDK Synth
        run: |
          cd cdk
          cdk synth --all --context stage=dev --context account=000000000000
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}

  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: cdk-synth
    if: github.ref == 'refs/heads/main'
    environment: dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - run: npm install -g aws-cdk && pip install -r requirements.txt
      - name: Upload Spark scripts
        run: aws s3 cp consumer/spark/ s3://${{ secrets.SCRIPTS_BUCKET }}/spark/ --recursive
      - name: CDK Deploy
        run: |
          cd cdk
          cdk deploy --all \
            --context stage=dev \
            --context account=${{ secrets.AWS_ACCOUNT_ID }} \
            --require-approval never

name: Streaming Pipeline CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
env:
  AWS_REGION: us-east-1
  PYTHON_VERSION: "3.11"
jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install Java (required for PySpark)
        uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: temurin
      - name: Install dependencies
        run: |
          pip install pyspark==3.5.0 delta-spark==3.0.0 pytest pytest-cov
          pip install boto3 moto[kinesis,s3,secretsmanager]
      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=consumer --cov=producer
  cdk-synth:
    name: CDK Synth
    runs-on: ubuntu-latest
    needs: test
    if: false
    steps:
      - uses: actions/checkout@v4
  deploy:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: cdk-synth
    if: false
    steps:
      - uses: actions/checkout@v4
